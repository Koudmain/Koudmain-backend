<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{title}} — Koudmain</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #f8fafc;
      font-family: 'Inter', 'Plus Jakarta Sans', Arial, sans-serif;
      color: #1e293b;
      padding: 40px 20px;
      line-height: 1.5;
    }
    .wrapper {
      max-width: 560px;
      margin: 0 auto;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 48px 40px;
      text-align: left;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
    }
    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 40px;
    }
    .logo-img {
      height: 36px;
      width: auto;
      object-fit: contain;
    }
    .logo-text {
      font-family: 'Inter', 'Plus Jakarta Sans', Arial, sans-serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -1px;
      color: #1e293b;
    }
    .logo-text span {
      color: #d84a22;
    }
    h1 {
      font-family: 'Plus Jakarta Sans', 'Inter', Arial, sans-serif;
      font-size: 24px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 16px;
      line-height: 1.3;
      text-align: center;
    }
    .lead-text {
      font-size: 15px;
      color: #475569;
      line-height: 1.6;
      margin-bottom: 32px;
      text-align: center;
    }
    .content-area {
      margin-bottom: 32px;
    }
    .warning {
      background: #fef2f2;
      border: 1px solid #fee2e2;
      border-radius: 12px;
      padding: 16px 20px;
      font-size: 13px;
      color: #ef4444;
      line-height: 1.5;
      margin-bottom: 32px;
    }
    .divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 32px 0;
    }
    .signature {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 8px;
    }
    .footer {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.7;
      text-align: center;
      margin-top: 32px;
    }
    .footer a {
      color: #d84a22;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <!-- Preheader text for inbox preview -->
  <span style="display:none !important; visibility:hidden; mso-hide:all; font-size:1px; color:#ffffff; line-height:1px; max-height:0px; max-width:0px; opacity:0; overflow:hidden;">
    {{preheader}}
  </span>

  <div class="wrapper">
    <div class="card">
      <div class="logo-container">
        <img class="logo-img" src="cid:logo" alt="Koudmain Logo" />
        <div class="logo-text">KOUD<span>MAIN</span></div>
      </div>

      <h1>{{title}}</h1>

      <p class="lead-text">{{leadText}}</p>

      <div class="content-area">
        {{contentHtml}}
      </div>

      {{warningHtml}}

      <p class="signature">
        {{signature}}
      </p>

      <hr class="divider" />

      <p class="footer">
        © {{year}} Koudmain — Tous droits réservés<br />
        <a href="https://koudmain.fr">koudmain.fr</a>
      </p>
    </div>
  </div>
</body>
</html>
