name: "CI"

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled]
  push:
    branches: [main, dev]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  events:
    name: "Events & Automation"
    if: github.event_name == 'pull_request' && github.event.action != 'labeled'
    uses: Koudmain/.github/.github/workflows/orchestrator-events.yml@chore/github-ci
    permissions:
      pull-requests: write
    with:
      target-repo-url: git@gitlab.com:koudmain/koudmain-backend.git
    secrets: inherit

  force-ci:
    name: "Force CI"
    if: github.event.action == 'labeled' && github.event.label.name == 'force ci'
    uses: Koudmain/.github/.github/workflows/orchestrator-ci.yml@chore/github-ci
    permissions:
      pull-requests: write
    with:
      language: "node"
      run-tests: true
      run-precommit: true
    secrets: inherit