name: "CI"

on:
  pull_request:
    types: [labeled]
  push:
    branches: [main, dev]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  force-ci:
    name: "Force CI"
    if: github.event_name == 'push' || (github.event.action == 'labeled' && (github.event.label.name == 'force ci' || github.event.label.name == 'to merge'))
    uses: Koudmain/.github/.github/workflows/orchestrator-ci.yml@main
    permissions:
      pull-requests: write
    with:
      language: "node"
      run-precommit: true
    secrets: inherit
