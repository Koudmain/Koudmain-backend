name: "CI"

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches: [main, dev]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  events:
    name: "Events & Automation"
    if: github.event_name == 'issues' || github.event_name == 'pull_request'
    uses: Koudmain/.github/.github/workflows/orchestrator-events.yml@main
    with:
      target-repo-url: git@gitlab.com:koudmain/koudmain-backend.git
    secrets: inherit

  pipeline:
    name: "CI Pipeline"
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    uses: Koudmain/.github/.github/workflows/orchestrator-ci.yml@main
    with:
      language: "node"
      node-version: "24"
      run-quality: true
    secrets: inherit